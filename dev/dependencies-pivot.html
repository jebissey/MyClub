  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent-ext: #f97316;
    --accent-int: #3b82f6;
    --accent-ext-dim: rgba(249,115,22,0.12);
    --accent-int-dim: rgba(59,130,246,0.12);
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-muted: #334155;
    --hit: #22c55e;
    --hit-dim: rgba(34,197,94,0.18);
    --header-h: 52px;
    --col-w: 28px;
    --row-label-w: 340px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .toolbar h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: -0.5px;
    color: #fff;
    white-space: nowrap;
  }
  .toolbar h1 span { color: var(--accent-int); }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    max-width: 360px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px 7px 34px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    outline: none;
    transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--accent-int); }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim); pointer-events: none;
  }

  .toggle-group {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .toggle-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    transition: all .15s;
    user-select: none;
  }
  .toggle-btn.active-ext { border-color: var(--accent-ext); color: var(--accent-ext); background: var(--accent-ext-dim); }
  .toggle-btn.active-int { border-color: var(--accent-int); color: var(--accent-int); background: var(--accent-int-dim); }
  .toggle-btn .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-ext { background: var(--accent-ext); }
  .dot-int { background: var(--accent-int); }

  .stats {
    margin-left: auto;
    color: var(--text-dim);
    font-size: 10px;
    white-space: nowrap;
  }
  .stats b { color: var(--text); }

  /* ── PIVOT CONTAINER ── */
  .pivot-wrap {
    flex: 1;
    overflow: auto;
    position: relative;
  }

  table {
    border-collapse: separate;
    border-spacing: 0;
    table-layout: fixed;
  }

  /* Sticky column headers (rotated) */
  thead tr th {
    position: sticky;
    top: 0;
    z-index: 3;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 0;
    width: var(--col-w);
    min-width: var(--col-w);
    max-width: var(--col-w);
    height: 160px;
    vertical-align: bottom;
  }

  thead tr th:first-child {
    position: sticky;
    left: 0;
    z-index: 10;
    width: var(--row-label-w);
    min-width: var(--row-label-w);
    max-width: var(--row-label-w);
    background: var(--surface);
    border-right: 2px solid var(--border);
    padding: 10px 14px;
    vertical-align: bottom;
    text-align: left;
  }

  .col-label-wrap {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    white-space: nowrap;
    font-size: 10px;
    padding: 6px 4px;
    color: var(--text-dim);
    cursor: default;
    transition: color .1s;
    letter-spacing: 0.3px;
  }
  .col-label-wrap:hover { color: var(--text); }
  th.group-ext .col-label-wrap { color: rgba(249,115,22,0.6); }
  th.group-ext .col-label-wrap:hover { color: var(--accent-ext); }
  th.group-int .col-label-wrap { color: rgba(59,130,246,0.6); }
  th.group-int .col-label-wrap:hover { color: var(--accent-int); }

  /* Group separator */
  th.group-sep {
    width: 12px; min-width: 12px; max-width: 12px;
    background: var(--bg);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  td.group-sep {
    background: var(--bg);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  /* Group header row */
  tr.group-header th {
    position: sticky;
    top: 0;
    z-index: 5;
    height: 26px;
    text-align: center;
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr.group-header th:first-child { text-align: left; padding-left: 14px; background: var(--surface); z-index: 10; }
  tr.group-header th.g-ext { background: var(--accent-ext-dim); color: var(--accent-ext); }
  tr.group-header th.g-int { background: var(--accent-int-dim); color: var(--accent-int); }
  tr.group-header th.g-none { background: var(--surface); }
  tr.group-header th.group-sep { background: var(--bg); }

  /* Data rows */
  tbody tr {
    transition: background .08s;
  }
  tbody tr:hover { background: var(--surface2); }
  tbody tr:hover td:first-child { background: var(--surface2); }
  tbody tr.hidden { display: none; }

  tbody td {
    width: var(--col-w);
    min-width: var(--col-w);
    max-width: var(--col-w);
    height: 22px;
    text-align: center;
    vertical-align: middle;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid rgba(37,42,58,0.5);
    padding: 0;
    font-size: 10px;
    position: relative;
  }

  /* Row label cell */
  td:first-child {
    position: sticky;
    left: 0;
    z-index: 2;
    background: var(--surface);
    border-right: 2px solid var(--border);
    width: var(--row-label-w);
    min-width: var(--row-label-w);
    max-width: var(--row-label-w);
    padding: 0 10px 0 14px;
    text-align: left;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: default;
  }
  td:first-child .path-prefix { color: var(--text-muted); }
  td:first-child .path-file { color: var(--text); font-weight: 600; }

  /* Hit cell */
  .hit {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 2px;
    background: var(--hit);
    opacity: 0.85;
    transition: opacity .1s, transform .1s;
  }
  tr:hover .hit { opacity: 1; transform: scale(1.2); }
  td.group-ext .hit { background: var(--accent-ext); }
  td.group-int .hit { background: var(--accent-int); }

  /* Zebra */
  tbody tr:nth-child(even) td:first-child { background: #141620; }
  tbody tr:nth-child(even):hover td:first-child { background: var(--surface2); }

  /* Highlighted column */
  td.col-hover { background: rgba(255,255,255,0.03); }

  /* Scrollbar */
  .pivot-wrap::-webkit-scrollbar { width: 8px; height: 8px; }
  .pivot-wrap::-webkit-scrollbar-track { background: var(--bg); }
  .pivot-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .pivot-wrap::-webkit-scrollbar-thumb:hover { background: #3a4060; }

  .no-results {
    padding: 40px;
    color: var(--text-dim);
    text-align: center;
    display: none;
  }

  /* Tooltip */
  .tip {
    position: fixed;
    background: #1e2535;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 10px;
    color: var(--text);
    pointer-events: none;
    z-index: 1000;
    max-width: 320px;
    word-break: break-all;
    opacity: 0;
    transition: opacity .1s;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
</style>

// ── Parse ──────────────────────────────────────────────────────────────
function parse(raw) {
  const rows = [];
  for (const line of raw.trim().split('\n')) {
    const m = line.match(/^(.+?) depends on: (.*)$/);
    if (!m) continue;
    const file = m[1].replace('../WebSite/', '');
    const deps = m[2] ? m[2].split(',').map(d => d.trim()).filter(Boolean) : [];
    rows.push({ file, deps });
  }
  return rows;
}

function normalize(dep) {
  // lowercase first char for consistency, remove leading backslash
  return dep.replace(/^\\/, '').toLowerCase();
}

function isAppClass(dep) {
  const n = normalize(dep);
  return n.startsWith('app\\') || n.startsWith('app/');
}

const data = parse(RAW);

// Collect all unique deps
const extSet = new Set(), intSet = new Set();
for (const row of data) {
  for (const dep of row.deps) {
    if (isAppClass(dep)) intSet.add(dep);
    else extSet.add(dep);
  }
}

const extCols = [...extSet].sort((a,b) => a.localeCompare(b));
const intCols = [...intSet].sort((a,b) => a.localeCompare(b));
const allCols = [...extCols, ...intCols]; // ext first, then int

// Build lookup: row -> set of normalized deps
const rowDeps = data.map(r => new Set(r.deps.map(normalize)));

// State
let showExt = true, showInt = true, filter = '';

function shortLabel(dep) {
  // show just last segment for readability
  const parts = dep.replace(/\\/g, '/').split('/');
  return parts[parts.length - 1];
}

function buildTable() {
  const table = document.getElementById('pivotTable');
  const wrap = document.getElementById('pivotWrap');
  table.innerHTML = '';

  const visibleExt = showExt ? extCols : [];
  const visibleInt = showInt ? intCols : [];
  const hasSep = visibleExt.length > 0 && visibleInt.length > 0;

  // ── Group header row ──
  const ghr = document.createElement('tr');
  ghr.className = 'group-header';
  // corner
  const cornerGH = document.createElement('th');
  cornerGH.className = 'g-none';
  cornerGH.textContent = '';
  ghr.appendChild(cornerGH);

  if (visibleExt.length) {
    const th = document.createElement('th');
    th.colSpan = visibleExt.length;
    th.className = 'g-ext';
    th.textContent = `Externes (${visibleExt.length})`;
    ghr.appendChild(th);
  }
  if (hasSep) {
    const sep = document.createElement('th');
    sep.className = 'group-sep';
    ghr.appendChild(sep);
  }
  if (visibleInt.length) {
    const th = document.createElement('th');
    th.colSpan = visibleInt.length;
    th.className = 'g-int';
    th.textContent = `App Classes (${visibleInt.length})`;
    ghr.appendChild(th);
  }

  // ── Column header row ──
  const thead = document.createElement('thead');
  thead.appendChild(ghr);
  const hr = document.createElement('tr');

  // Corner cell
  const corner = document.createElement('th');
  corner.style.height = '160px';
  const cornerLabel = document.createElement('div');
  cornerLabel.style.cssText = 'font-family:Syne,sans-serif;font-size:11px;color:var(--text-dim);padding:4px 0;';
  cornerLabel.textContent = `${data.length} fichiers`;
  corner.appendChild(cornerLabel);
  hr.appendChild(corner);

  const allVisible = [...visibleExt.map(d=>({d,g:'ext'})), ...(hasSep?[{d:null,g:'sep'}]:[]), ...visibleInt.map(d=>({d,g:'int'}))];

  for (const {d, g} of allVisible) {
    const th = document.createElement('th');
    if (g === 'sep') { th.className = 'group-sep'; hr.appendChild(th); continue; }
    th.className = `group-${g}`;
    th.dataset.col = normalize(d);
    const wrap2 = document.createElement('div');
    wrap2.className = 'col-label-wrap';
    wrap2.textContent = shortLabel(d);
    wrap2.title = d;
    th.appendChild(wrap2);
    hr.appendChild(th);
  }
  thead.appendChild(hr);
  table.appendChild(thead);

  // ── Body ──
  const tbody = document.createElement('tbody');
  let visCount = 0;

  for (let ri = 0; ri < data.length; ri++) {
    const row = data[ri];
    const tr = document.createElement('tr');
    const lc = filter.toLowerCase();
    if (lc && !row.file.toLowerCase().includes(lc)) {
      tr.className = 'hidden';
    } else {
      visCount++;
    }

    // Label cell
    const td0 = document.createElement('td');
    // split into prefix / filename
    const parts = row.file.split('/');
    const fname = parts.pop();
    const prefix = parts.join('/') + '/';
    td0.innerHTML = `<span class="path-prefix">${escHtml(prefix)}</span><span class="path-file">${escHtml(fname)}</span>`;
    td0.title = row.file;
    tr.appendChild(td0);

    const deps = rowDeps[ri];

    for (const {d, g} of allVisible) {
      const td = document.createElement('td');
      if (g === 'sep') { td.className = 'group-sep'; tr.appendChild(td); continue; }
      td.className = `group-${g}`;
      td.dataset.col = normalize(d);
      if (deps.has(normalize(d))) {
        const dot = document.createElement('span');
        dot.className = 'hit';
        dot.title = d;
        td.appendChild(dot);
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);

  // Stats
  document.getElementById('stats').innerHTML =
    `<b>${visCount}</b> / ${data.length} fichiers &nbsp;·&nbsp; <b>${visibleExt.length + visibleInt.length}</b> dépendances`;

  document.getElementById('noResults').style.display = (visCount === 0 && filter) ? 'block' : 'none';
  wrap.style.display = (visCount === 0 && filter) ? 'none' : '';

  // Column hover highlight
  table.addEventListener('mouseover', colHover);
  table.addEventListener('mouseout', colUnhover);

  // Tooltip
  table.addEventListener('mousemove', showTip);
  table.addEventListener('mouseleave', hideTip);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let hoverCol = null;
function colHover(e) {
  const col = e.target.closest('[data-col]');
  if (!col) return;
  const key = col.dataset.col;
  if (key === hoverCol) return;
  if (hoverCol) unhighlightCol(hoverCol);
  hoverCol = key;
  highlightCol(key);
}
function colUnhover() {
  if (hoverCol) { unhighlightCol(hoverCol); hoverCol = null; }
}
function highlightCol(key) {
  document.querySelectorAll(`[data-col="${key}"]`).forEach(el => el.classList.add('col-hover'));
}
function unhighlightCol(key) {
  document.querySelectorAll(`[data-col="${key}"]`).forEach(el => el.classList.remove('col-hover'));
}

const tip = document.getElementById('tip');
function showTip(e) {
  const hit = e.target.closest('.hit');
  const th = e.target.closest('th[data-col]');
  if (hit) {
    tip.textContent = hit.title;
    tip.style.opacity = '1';
    positionTip(e);
  } else if (th) {
    const label = th.querySelector('.col-label-wrap');
    tip.textContent = label ? label.title : '';
    tip.style.opacity = '1';
    positionTip(e);
  } else {
    tip.style.opacity = '0';
  }
}
function positionTip(e) {
  tip.style.left = (e.clientX + 12) + 'px';
  tip.style.top = (e.clientY + 12) + 'px';
}
function hideTip() { tip.style.opacity = '0'; }

function toggleGroup(g) {
  if (g === 'ext') {
    showExt = !showExt;
    document.getElementById('btnExt').classList.toggle('active-ext', showExt);
  } else {
    showInt = !showInt;
    document.getElementById('btnInt').classList.toggle('active-int', showInt);
  }
  buildTable();
}

document.getElementById('searchInput').addEventListener('input', function() {
  filter = this.value;
  // just toggle hidden on rows without rebuilding
  const lc = filter.toLowerCase();
  const trs = document.querySelectorAll('#pivotTable tbody tr');
  let vis = 0;
  trs.forEach(tr => {
    const label = tr.querySelector('td:first-child');
    if (!label) return;
    const text = label.title || '';
    const hidden = lc && !text.toLowerCase().includes(lc);
    tr.classList.toggle('hidden', hidden);
    if (!hidden) vis++;
  });
  document.getElementById('stats').innerHTML =
    `<b>${vis}</b> / ${data.length} fichiers &nbsp;·&nbsp; <b>${(showExt?extCols.length:0)+(showInt?intCols.length:0)}</b> dépendances`;
  document.getElementById('noResults').style.display = (vis === 0 && lc) ? 'block' : 'none';
  document.getElementById('pivotWrap').style.display = (vis === 0 && lc) ? 'none' : '';
});

buildTable();
</script>
</body>
</html>
